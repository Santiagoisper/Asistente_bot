name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main, claude/**]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ichtys
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ichtys/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
