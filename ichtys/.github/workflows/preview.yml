# Preview Deploy — PLACEHOLDER
#
# Se configura una vez que el proyecto esté conectado a Vercel.
# Vercel ya crea preview deployments automáticos por cada PR vía su integración
# nativa de GitHub, así que este workflow puede quedar vacío hasta que se
# necesite un paso de deploy custom (p. ej. amondnet/vercel-action con
# VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID en secrets).
#
# Ver docs/ARCHITECTURE.md → CI/CD.

name: Preview Deploy
on:
  pull_request:
    branches: [main, develop]
jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Preview deploy se configura tras conectar Vercel."
