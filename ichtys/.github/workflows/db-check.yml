# DB Check — PLACEHOLDER
#
# Valida que el schema Drizzle y las migrations no tengan drift, corriendo
# `pnpm db:check` contra un Neon branch de test efímero (uno por PR).
#
# Requiere configurar en secrets:
#   - DATABASE_URL           (pooled, del Neon branch de test)
#   - DATABASE_URL_UNPOOLED  (directo, para drizzle-kit)
# y, opcionalmente, la integración de Neon + GitHub para crear/destruir el
# branch automáticamente.
#
# Ver docs/ARCHITECTURE.md → CI/CD y packages/db/drizzle.config.ts.

name: DB Check
on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/db/**'
      - '.github/workflows/db-check.yml'
jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "DB check se configura con el Neon branch de test."
